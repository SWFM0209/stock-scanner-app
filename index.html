<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Stock Scanner</title>
<style>
body { font-family: Arial; background:#f4f7fb; }
.stock-card { border:1px solid #ddd; padding:10px; margin:10px; border-radius:10px; cursor:pointer;}
.metric { margin:5px 0; }
.loading { color:blue; }
.error { color:red; }
</style>
</head>
<body>

<h2>📈 Stock Scanner</h2>
<button onclick="loadScan()">掃描股票</button>

<div id="list"></div>
<hr>
<div id="analysisContent">點一檔股票查看分析</div>

<script>
const API_BASE = "https://stock-scanner-api-t8ss.onrender.com";

function formatLot(vol){
    return (Number(vol || 0) / 1000).toLocaleString(undefined, {maximumFractionDigits:0});
}

async function loadScan() {
    const list = document.getElementById("list");
    list.innerHTML = '<div class="loading">載入中...</div>';

    try {
        const res = await fetch(API_BASE + "/scan");
        const data = await res.json();

        const rows = data.data || [];
        rows.sort((a,b)=>b.score - a.score);

        list.innerHTML = "";

        rows.forEach(stock=>{
            const div = document.createElement("div");
            div.className = "stock-card";

            div.innerHTML = `
                <div><b>${stock.symbol}</b></div>
                <div class="metric">分數: ${stock.score}</div>
                <div class="metric">價格: ${stock.close}</div>
                <div class="metric">強度: ${stock.strength}</div>
                <div class="metric">成交量(張): ${formatLot(stock.volume)}</div>
                <div class="metric">開盤/高點: ${stock.open ?? "-"} / ${stock.high ?? "-"}</div>
            `;

            div.onclick = ()=>loadAnalysis(stock.symbol);
            list.appendChild(div);
        });

    } catch(err){
        list.innerHTML = '<div class="error">Load failed</div>';
    }
}

async function loadAnalysis(symbol){
    const box = document.getElementById("analysisContent");
    box.innerHTML = "分析中...";

    try{
        const res = await fetch(API_BASE + "/ai/analyze",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({symbol})
        });

        const data = await res.json();

        box.innerHTML = `
            <h3>${data.symbol}</h3>
            <p>分數: ${data.score}</p>
            <p>成交量(張): ${formatLot(data.volume)}</p>
            <p>${data.llm_analysis}</p>
            <small>模型: ${data.llm_model}</small>
        `;

    }catch(e){
        box.innerHTML = "分析失敗";
    }
}
</script>

</body>
</html>
