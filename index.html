cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股掃描器</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #020817;
      color: #e2e8f0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      margin-bottom: 24px;
    }

    .title {
      margin: 0 0 8px 0;
      font-size: 32px;
      font-weight: 700;
      color: #f8fafc;
    }

    .subtitle {
      margin: 0;
      color: #94a3b8;
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin: 24px 0;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .status {
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      color: #cbd5e1;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.error {
      background: #451a1a;
      border-color: #7f1d1d;
      color: #fecaca;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 20px;
      min-height: 520px;
    }

    .panel-title {
      margin: 0 0 16px 0;
      font-size: 20px;
      color: #f8fafc;
    }

    .stock-list {
      display: grid;
      gap: 12px;
      max-height: 72vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .stock-card {
      background: #111827;
      border: 1px solid #243041;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
    }

    .stock-card:hover {
      border-color: #3b82f6;
    }

    .stock-card.active {
      border-color: #60a5fa;
      background: #172554;
    }

    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .stock-name {
      font-size: 18px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 4px;
    }

    .stock-symbol {
      font-size: 13px;
      color: #94a3b8;
    }

    .score-badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .score-high {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
    }

    .score-mid {
      background: rgba(245, 158, 11, 0.15);
      color: #fcd34d;
    }

    .score-low {
      background: rgba(148, 163, 184, 0.15);
      color: #cbd5e1;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .metric-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
      word-break: break-word;
    }

    .detail-box {
      background: #111827;
      border: 1px solid #243041;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .detail-title {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 6px;
    }

    .detail-symbol {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 16px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
    }

    .analysis-box {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 16px;
      min-height: 220px;
      white-space: pre-wrap;
      line-height: 1.7;
      color: #e2e8f0;
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      color: #94a3b8;
      background: #111827;
      border: 1px dashed #334155;
      border-radius: 14px;
      text-align: center;
      padding: 20px;
    }

    .small-note {
      margin-top: 12px;
      font-size: 13px;
      color: #94a3b8;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: auto;
      }

      .stock-list {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">台股掃描器</h1>
      <p class="subtitle">即時掃描分數、個股資訊與 AI 分析</p>
    </div>

    <div class="toolbar">
      <button class="btn-primary" id="scanBtn">掃描股票</button>
    </div>

    <div class="status" id="statusBox"></div>

    <div class="layout">
      <section class="panel">
        <h2 class="panel-title">掃描結果</h2>
        <div class="stock-list" id="stockList">
          <div class="empty">尚未掃描，請先按「掃描股票」</div>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">個股分析</h2>
        <div id="detailArea">
          <div class="empty">請先從左側選擇一檔股票</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const API_BASE = "https://stock-scanner-apiz.onrender.com";

    const stockNames = {
      "1101": "台泥",
      "1102": "亞泥",
      "1216": "統一",
      "1301": "台塑",
      "1303": "南亞",
      "1326": "台化",
      "1402": "遠東新",
      "1476": "儒鴻",
      "1504": "東元",
      "1590": "亞德客-KY",
      "1605": "華新",
      "2002": "中鋼",
      "2207": "和泰車",
      "2301": "光寶科",
      "2303": "聯電",
      "2308": "台達電",
      "2317": "鴻海",
      "2327": "國巨",
      "2330": "台積電",
      "2345": "智邦",
      "2357": "華碩",
      "2379": "瑞昱",
      "2382": "廣達",
      "2395": "研華",
      "2408": "南亞科",
      "2409": "友達",
      "2454": "聯發科",
      "2603": "長榮",
      "2609": "陽明",
      "2615": "萬海",
      "2881": "富邦金",
      "2882": "國泰金",
      "2884": "玉山金",
      "2891": "中信金",
      "2892": "第一金",
      "2912": "統一超",
      "3008": "大立光",
      "3034": "聯詠",
      "3045": "台灣大",
      "3231": "緯創",
      "3661": "世芯-KY",
      "3711": "日月光投控",
      "4904": "遠傳",
      "4938": "和碩",
      "5880": "合庫金",
      "6505": "台塑化",
      "6669": "緯穎",
      "6770": "力積電",
      "6805": "富世達",
      "8046": "南電",
      "8069": "元太",
      "8150": "南茂",
      "8210": "勤誠",
      "8299": "群聯",
      "8454": "富邦媒"
    };

    let scanData = [];
    let selectedSymbol = null;

    const scanBtn = document.getElementById("scanBtn");
    const stockList = document.getElementById("stockList");
    const detailArea = document.getElementById("detailArea");
    const statusBox = document.getElementById("statusBox");

    function showStatus(message, isError = false) {
      statusBox.textContent = message;
      statusBox.className = isError ? "status show error" : "status show";
    }

    function getScoreClass(score) {
      if (score >= 25) return "score-high";
      if (score >= 20) return "score-mid";
      return "score-low";
    }

    function renderStockList(items) {
      if (!items || items.length === 0) {
        stockList.innerHTML = '<div class="empty">目前沒有掃描結果</div>';
        return;
      }

      stockList.innerHTML = items.map(item => {
        const name = item.name || stockNames[item.symbol] || "";
        return `
          <div class="stock-card ${selectedSymbol === item.symbol ? "active" : ""}" onclick="selectStock('${item.symbol}')">
            <div class="stock-header">
              <div>
                <div class="stock-name">${name || item.symbol}</div>
                <div class="stock-symbol">${item.symbol}</div>
              </div>
              <div class="score-badge ${getScoreClass(item.score)}">分數 ${item.score}</div>
            </div>

            <div class="stock-grid">
              <div class="metric">
                <div class="metric-label">現價</div>
                <div class="metric-value">${item.close ?? "-"}</div>
              </div>
              <div class="metric">
                <div class="metric-label">開盤</div>
                <div class="metric-value">${item.open ?? "-"}</div>
              </div>
              <div class="metric">
                <div class="metric-label">高點</div>
                <div class="metric-value">${item.high ?? "-"}</div>
              </div>
              <div class="metric">
                <div class="metric-label">成交量</div>
                <div class="metric-value">${formatVolume(item.volume)}</div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderDetail(item, aiText = "") {
      const name = item.name || stockNames[item.symbol] || "";

      detailArea.innerHTML = `
        <div class="detail-box">
          <div class="detail-title">${name || item.symbol}</div>
          <div class="detail-symbol">${item.symbol}</div>

          <div class="stock-grid">
            <div class="metric">
              <div class="metric-label">現價</div>
              <div class="metric-value">${item.close ?? "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">開盤價</div>
              <div class="metric-value">${item.open ?? "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">日內高點</div>
              <div class="metric-value">${item.high ?? "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">成交量</div>
              <div class="metric-value">${formatVolume(item.volume)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">強度</div>
              <div class="metric-value">${item.strength ?? "-"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">分數</div>
              <div class="metric-value">${item.score ?? "-"}</div>
            </div>
          </div>

          <div class="tag-list">
            ${(item.pros || []).map(x => `<span class="tag">${x}</span>`).join("")}
            ${(item.risks || []).map(x => `<span class="tag">${x}</span>`).join("")}
          </div>
        </div>

        <div class="analysis-box">${aiText || "AI 分析載入中..."}</div>
        <div class="small-note">若名稱未顯示，會以內建對照表或代號替代。</div>
      `;
    }

    function formatVolume(v) {
      if (v === null || v === undefined) return "-";
      const n = Number(v);
      if (Number.isNaN(n)) return v;
      return n.toLocaleString("zh-TW");
    }

    async function scanStocks() {
      showStatus("掃描中，請稍候...");
      stockList.innerHTML = '<div class="empty">掃描中...</div>';
      detailArea.innerHTML = '<div class="empty">請稍候，正在更新掃描資料</div>';

      try {
        const res = await fetch(`${API_BASE}/scan`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "掃描失敗");
        }

        scanData = data.data || [];
        selectedSymbol = null;

        renderStockList(scanData);
        showStatus(`掃描完成，共 ${scanData.length} 檔`);
      } catch (err) {
        console.error(err);
        showStatus(`掃描失敗：${err.message}`, true);
        stockList.innerHTML = '<div class="empty">掃描失敗，請稍後再試</div>';
      }
    }

    async function selectStock(symbol) {
      selectedSymbol = symbol;
      renderStockList(scanData);

      const item = scanData.find(x => x.symbol === symbol);
      if (!item) return;

      renderDetail(item);

      try {
        const res = await fetch(`${API_BASE}/ai/analyze`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ symbol })
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || "AI 分析失敗");
        }

        renderDetail(item, data.llm_analysis || "無分析結果");
      } catch (err) {
        console.error(err);
        renderDetail(item, `AI 分析失敗：${err.message}`);
      }
    }

    scanBtn.addEventListener("click", scanStocks);

    window.selectStock = selectStock;
  </script>
</body>
</html>
EOF
