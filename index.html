<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Scanner App</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #111827;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 32px;
            font-weight: 700;
        }
        .subtitle {
            color: #6b7280;
            font-size: 14px;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            background: #111827;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { opacity: 0.92; }
        .layout {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 20px;
        }
        .panel {
            background: white;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }
        .panel-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .stock-card {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 14px;
            cursor: pointer;
            transition: 0.2s ease;
            background: #fff;
        }
        .stock-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
            background: #f9fbff;
        }
        .stock-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }
        .symbol {
            font-size: 22px;
            font-weight: 700;
        }
        .reason-badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: white;
            background: #2563eb;
            white-space: nowrap;
        }
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
        }
        .metric {
            background: #f8fafc;
            border-radius: 12px;
            padding: 10px;
        }
        .metric-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .metric-value {
            font-size: 15px;
            font-weight: 700;
        }
        .analysis-empty {
            color: #6b7280;
            line-height: 1.6;
        }
        .analysis-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .analysis-symbol {
            font-size: 28px;
            font-weight: 800;
        }
        .analysis-stage {
            padding: 6px 12px;
            border-radius: 999px;
            background: #111827;
            color: white;
            font-size: 13px;
            font-weight: 700;
        }
        .analysis-metrics {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }
        .section { margin-top: 16px; }
        .section h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }
        .section ul {
            margin: 0;
            padding-left: 20px;
            line-height: 1.7;
        }
        .suggestion, .llm-box {
            background: #f8fafc;
            padding: 14px;
            border-radius: 12px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .loading {
            color: #2563eb;
            font-weight: 700;
        }
        .error {
            color: #dc2626;
            font-weight: 700;
        }
        .muted {
            color: #6b7280;
            font-size: 12px;
            margin-top: 8px;
        }
        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .stock-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .analysis-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 520px) {
            .stock-grid { grid-template-columns: 1fr; }
            .analysis-metrics { grid-template-columns: 1fr; }
            .title { font-size: 26px; }
            .symbol { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">📈 Stock Scanner</div>
        <div class="subtitle">富果即時行情 + AI 分析</div>
        <div class="toolbar">
            <button onclick="loadScan()">🔍 掃描股票</button>
        </div>
    </div>

    <div class="layout">
        <div class="panel">
            <div class="panel-title">掃描排行榜</div>
            <div id="list" class="stock-list">
                <div class="analysis-empty">按下「掃描股票」後，這裡會顯示結果。</div>
            </div>
        </div>

        <div class="panel" id="analysisSection">
            <div class="panel-title">AI 分析</div>
            <div id="analysisContent" class="analysis-empty">點一檔股票查看分析。</div>
        </div>
    </div>
</div>

<script>
const API_BASE = "https://stock-scanner-api-t8ss.onrender.com";

function formatLot(vol) {
    return (Number(vol || 0) / 1000).toLocaleString(undefined, { maximumFractionDigits: 0 });
}

async function loadScan() {
    const list = document.getElementById("list");
    list.innerHTML = '<div class="loading">載入掃描結果中...</div>';

    async function fetchScanOnce() {
        const res = await fetch(API_BASE + "/scan");
        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }
        return await res.json();
    }

    try {
        let data;

        try {
            data = await fetchScanOnce();
        } catch (e) {
            await new Promise(resolve => setTimeout(resolve, 2000));
            data = await fetchScanOnce();
        }

        const rows = data.data || [];
        rows.sort((a, b) => Number(b.score ?? -999) - Number(a.score ?? -999));

        if (!rows.length) {
            list.innerHTML = '<div class="analysis-empty">目前沒有資料。</div>';
            return;
        }

        list.innerHTML = "";

        rows.forEach(stock => {
            const div = document.createElement("div");
            div.className = "stock-card";

            div.innerHTML = `
                <div class="stock-top">
                    <div class="symbol">${stock.symbol}</div>
                    <div class="reason-badge">${stock.stage || stock.reason || "即時分析"}</div>
                </div>
                <div class="stock-grid">
                    <div class="metric">
                        <div class="metric-label">分數</div>
                        <div class="metric-value">${Number(stock.score ?? 0).toFixed(3)}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">價格</div>
                        <div class="metric-value">${Number(stock.close ?? 0).toFixed(2)}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">強度</div>
                        <div class="metric-value">${Number(stock.strength ?? 0).toFixed(3)}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">成交量（張）</div>
                        <div class="metric-value">${formatLot(stock.volume)}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">開盤 / 高點</div>
                        <div class="metric-value">${stock.open ?? "—"} / ${stock.high ?? "—"}</div>
                    </div>
                </div>
            `;

            div.onclick = () => loadAnalysis(stock.symbol);
            list.appendChild(div);
        });

    } catch (err) {
        list.innerHTML = '<div class="error">載入失敗：' + err + '</div>';
        console.error(err);
    }
}

async function loadAnalysis(symbol) {
    const box = document.getElementById("analysisContent");
    const section = document.getElementById("analysisSection");

    box.innerHTML = '<div class="loading">分析中...</div>';
    section.scrollIntoView({ behavior: "smooth", block: "start" });

    try {
        const res = await fetch(API_BASE + "/ai/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ symbol })
        });

        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }

        const data = await res.json();

        if (data.error) {
            box.innerHTML = '<div class="error">分析失敗：' + data.error + '</div>';
            section.scrollIntoView({ behavior: "smooth", block: "start" });
            return;
        }

        const pros = (data.pros || []).map(x => `<li>${x}</li>`).join("");
        const risks = (data.risks || []).map(x => `<li>${x}</li>`).join("");

        box.innerHTML = `
            <div class="analysis-head">
                <div class="analysis-symbol">${data.symbol}</div>
                <div class="analysis-stage">${data.stage || "即時分析"}</div>
            </div>

            <div class="analysis-metrics">
                <div class="metric">
                    <div class="metric-label">分數</div>
                    <div class="metric-value">${Number(data.score ?? 0).toFixed(3)}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">目前價格</div>
                    <div class="metric-value">${data.close ?? "—"}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">開盤價</div>
                    <div class="metric-value">${data.open ?? "—"}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">日內高點</div>
                    <div class="metric-value">${data.high ?? "—"}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">成交量（張）</div>
                    <div class="metric-value">${formatLot(data.volume)}</div>
                </div>
            </div>

            <div class="section">
                <h3>優點</h3>
                <ul>${pros || "<li>無</li>"}</ul>
            </div>

            <div class="section">
                <h3>風險</h3>
                <ul>${risks || "<li>無</li>"}</ul>
            </div>

            <div class="section">
                <h3>建議</h3>
                <div class="suggestion">${data.suggestion ?? "—"}</div>
            </div>

            <div class="section">
                <h3>AI 分析</h3>
                <div class="llm-box">${data.llm_analysis ?? "目前沒有 AI 分析"}</div>
                <div class="muted">模型：${data.llm_model ?? "unknown"}</div>
            </div>
        `;

        section.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (err) {
        box.innerHTML = '<div class="error">分析失敗：' + err + '</div>';
        section.scrollIntoView({ behavior: "smooth", block: "start" });
        console.error(err);
    }
}
</script>
</body>
</html>
